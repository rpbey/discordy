name: Build - Documentation
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docs/**"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@master

      - name: Install Node
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies for docs
        run: bun install
        working-directory: ./docs

      - name: Build docs
        run: bun run build
        working-directory: ./docs
